<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史疆域动态渲染</title>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        /* ============================================
           宋式美学 CSS 变量与基础样式
           ============================================ */
        :root {
            --song-paper: #f5f0e8;
            --song-paper-dark: #e8e0d0;
            --song-ink: #2c2c2c;
            --song-ink-light: #5a5a5a;
            --song-cinnabar: #8B2500;
            --song-cinnabar-light: #c4543a;
            --song-gold: #c9b896;
            --song-gold-light: #e8d5b5;
            --song-jade: #4a7c59;
            --song-border: rgba(201, 184, 150, 0.35);
            --song-shadow: rgba(44, 44, 44, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", serif;
            background: var(--song-paper);
            overflow: hidden;
            color: var(--song-ink);
        }

        #map { width: 100vw; height: 100vh; position: relative; }

        /* 加载遮罩 */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e8e0d0 0%, #f5f0e8 50%, #e8e0d0 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 0.8s ease;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .loading-scroll { width: 200px; height: 6px; background: rgba(201, 184, 150, 0.3); border-radius: 3px; overflow: hidden; margin-top: 24px; }
        .loading-scroll-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--song-cinnabar), var(--song-cinnabar-light)); border-radius: 3px; animation: scrollFill 2s ease-in-out infinite; }
        @keyframes scrollFill { 0% { width: 0%; margin-left: 0; } 50% { width: 70%; margin-left: 15%; } 100% { width: 0%; margin-left: 100%; } }
        .loading-text { color: var(--song-ink-light); font-size: 16px; letter-spacing: 8px; margin-top: 20px; font-weight: 400; }
        .loading-subtext { color: var(--song-gold); font-size: 12px; letter-spacing: 4px; margin-top: 10px; }

        /* 错误遮罩 */
        .error-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--song-paper); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 3000;
        }
        .error-overlay.show { display: flex; }
        .error-seal { width: 60px; height: 60px; border: 2px solid var(--song-cinnabar); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--song-cinnabar); font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .error-text { color: var(--song-cinnabar); font-size: 16px; max-width: 500px; text-align: center; line-height: 1.8; letter-spacing: 2px; }
        .error-hint { color: var(--song-ink-light); font-size: 13px; margin-top: 15px; max-width: 550px; text-align: center; line-height: 1.8; }

        /* 标题栏 */
        .title-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; text-align: center; pointer-events: none;
            background: rgba(245, 240, 232, 0.88); border: 1px solid var(--song-border);
            border-radius: 4px; padding: 16px 40px; backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px var(--song-shadow);
        }
        .title-bar h1 { color: var(--song-ink); font-size: 26px; font-weight: 700; letter-spacing: 6px; margin-bottom: 6px; font-family: "Noto Serif SC", "Source Han Serif SC", serif; }
        .title-bar .subtitle { color: var(--song-ink-light); font-size: 13px; letter-spacing: 3px; }
        .title-bar .period { color: var(--song-cinnabar); font-size: 11px; letter-spacing: 2px; margin-top: 4px; opacity: 0.8; }

        /* 图例 */
        .legend {
            position: absolute; top: 90px; right: 20px; z-index: 1000;
            background: rgba(245, 240, 232, 0.9); border: 1px solid var(--song-border);
            border-radius: 4px; padding: 16px; backdrop-filter: blur(8px);
            max-width: 180px; box-shadow: 0 2px 10px var(--song-shadow); transition: opacity 0.3s;
        }
        .legend-title { color: var(--song-ink); font-size: 14px; font-weight: 700; margin-bottom: 12px; letter-spacing: 4px; border-bottom: 1px solid var(--song-border); padding-bottom: 8px; text-align: center; }
        .legend-item { display: flex; align-items: center; margin-bottom: 7px; font-size: 12px; color: var(--song-ink-light); transition: transform 0.15s; }
        .legend-item:hover { transform: translateX(-2px); }
        .legend-color { width: 14px; height: 10px; border-radius: 2px; margin-right: 8px; border: 1px solid rgba(0, 0, 0, 0.15); flex-shrink: 0; }
        .legend-label { flex: 1; letter-spacing: 1px; }
        .legend-vassal-tag { font-size: 9px; color: var(--song-gold); margin-left: 4px; }

        /* 时间轴控制器 */
        .time-controller {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(245, 240, 232, 0.92); border: 1px solid var(--song-border);
            border-radius: 4px; padding: 20px 32px; min-width: 460px;
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px var(--song-shadow);
        }
        .time-display { text-align: center; margin-bottom: 16px; }
        .time-display .year { color: var(--song-cinnabar); font-size: 34px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 12px rgba(139, 37, 0, 0.15); font-family: "Noto Serif SC", serif; }
        .time-display .event-title { color: var(--song-ink); font-size: 16px; margin-top: 8px; letter-spacing: 2px; font-weight: 600; }
        .time-display .event-desc { color: var(--song-ink-light); font-size: 12px; margin-top: 6px; max-width: 380px; line-height: 1.6; margin-left: auto; margin-right: auto; }

        .progress-bar { width: 100%; height: 4px; background: rgba(201, 184, 150, 0.25); border-radius: 2px; margin: 16px 0; position: relative; cursor: pointer; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--song-cinnabar), var(--song-cinnabar-light)); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
        .progress-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: var(--song-cinnabar); border: 2px solid var(--song-paper); border-radius: 50%; box-shadow: 0 0 8px rgba(139, 37, 0, 0.4); transition: left 0.4s ease; }
        .progress-ticks { display: flex; justify-content: space-between; margin-top: 4px; padding: 0 2px; }
        .progress-tick { width: 1px; height: 6px; background: var(--song-gold); opacity: 0.5; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 12px; }
        .btn { background: transparent; border: 1px solid var(--song-border); color: var(--song-ink-light); padding: 7px 16px; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.2s; letter-spacing: 2px; }
        .btn:hover { background: rgba(201, 184, 150, 0.2); border-color: var(--song-gold); color: var(--song-ink); }
        .btn:active { transform: scale(0.96); }
        .btn-play { background: rgba(139, 37, 0, 0.08); border-color: rgba(139, 37, 0, 0.4); color: var(--song-cinnabar); font-size: 14px; padding: 7px 22px; }
        .btn-play:hover { background: rgba(139, 37, 0, 0.18); border-color: var(--song-cinnabar); }
        .btn-play.playing { background: rgba(74, 124, 89, 0.1); border-color: rgba(74, 124, 89, 0.4); color: var(--song-jade); }
        .counter { color: var(--song-gold); font-size: 11px; letter-spacing: 2px; margin-left: 8px; }

        /* 事件通知 */
        .event-notification {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%) translateY(-30px);
            z-index: 1001; background: rgba(245, 240, 232, 0.95); border: 1px solid var(--song-cinnabar);
            border-radius: 4px; padding: 14px 28px; backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(139, 37, 0, 0.15); opacity: 0; pointer-events: none;
            transition: all 0.5s ease; text-align: center; max-width: 400px;
        }
        .event-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .event-notification .notif-type { color: var(--song-cinnabar); font-size: 11px; letter-spacing: 3px; margin-bottom: 4px; }
        .event-notification .notif-title { color: var(--song-ink); font-size: 15px; font-weight: 600; letter-spacing: 2px; }

        /* 城池弹窗 */
        .city-popup {
            position: absolute; z-index: 1000; background: rgba(245, 240, 232, 0.96);
            border: 1px solid var(--song-border); border-radius: 4px; padding: 14px 18px;
            color: var(--song-ink); font-size: 13px; pointer-events: none; display: none;
            max-width: 260px; backdrop-filter: blur(10px); box-shadow: 0 4px 16px var(--song-shadow);
        }
        .city-popup::before { content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 10px; height: 10px; background: rgba(245, 240, 232, 0.96); border-left: 1px solid var(--song-border); border-top: 1px solid var(--song-border); }
        .city-popup .popup-name { font-size: 16px; font-weight: 700; color: var(--song-ink); margin-bottom: 6px; letter-spacing: 2px; border-bottom: 1px solid var(--song-border); padding-bottom: 6px; }
        .city-popup .popup-owner { color: var(--song-cinnabar); font-size: 12px; letter-spacing: 1px; }
        .city-popup .popup-type { color: var(--song-gold); font-size: 11px; margin-top: 3px; }
        .city-popup .popup-note { color: var(--song-ink-light); font-size: 11px; margin-top: 6px; line-height: 1.5; }

        /* 快捷键 */
        .shortcuts { position: absolute; bottom: 16px; right: 16px; z-index: 1000; color: var(--song-gold); font-size: 10px; text-align: right; line-height: 1.8; letter-spacing: 1px; opacity: 0.7; }
        .shortcuts kbd { background: rgba(245, 240, 232, 0.6); border: 1px solid var(--song-border); border-radius: 2px; padding: 1px 5px; font-family: inherit; color: var(--song-ink-light); font-size: 10px; }

        /* 响应式 */
        @media (max-width: 768px) {
            .time-controller { min-width: 90vw; padding: 14px 16px; }
            .title-bar { padding: 10px 20px; }
            .title-bar h1 { font-size: 18px; }
            .legend { top: 70px; right: 10px; max-width: 140px; padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-text" id="loading-text">载史入图</div>
        <div class="loading-scroll"><div class="loading-scroll-fill"></div></div>
        <div class="loading-subtext" id="loading-subtext">正在加载疆域数据...</div>
    </div>

    <div class="error-overlay" id="error-overlay">
        <div class="error-seal">误</div>
        <div class="error-text" id="error-text">数据加载失败</div>
        <div class="error-hint" id="error-hint"></div>
    </div>

    <div id="map"></div>

    <div class="title-bar" id="title-bar" style="display:none;">
        <h1 id="dynasty-name">历史疆域</h1>
        <div class="subtitle" id="dynasty-subtitle">请配置朝代数据</div>
        <div class="period" id="dynasty-period"></div>
    </div>

    <div class="event-notification" id="event-notification">
        <div class="notif-type" id="notif-type">领土变更</div>
        <div class="notif-title" id="notif-title"></div>
    </div>

    <div class="legend" id="legend" style="display:none;">
        <div class="legend-title">势力图例</div>
        <div id="legend-content"></div>
    </div>

    <div class="time-controller" id="time-controller" style="display:none;">
        <div class="time-display">
            <div class="year" id="year-display">——</div>
            <div class="event-title" id="event-title">初始状态</div>
            <div class="event-desc" id="event-desc"></div>
        </div>
        <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-dot" id="progress-dot" style="left: 0%"></div>
        </div>
        <div class="progress-ticks" id="progress-ticks"></div>
        <div class="controls">
            <button class="btn" id="btn-first" title="首个事件">⏮ 首</button>
            <button class="btn" id="btn-prev" title="上一个">← 上</button>
            <button class="btn btn-play" id="btn-play" title="播放/暂停">▶ 播放</button>
            <button class="btn" id="btn-next" title="下一个">下 →</button>
            <button class="btn" id="btn-last" title="末个事件">末 ⏭</button>
            <span class="counter" id="counter">1 / 1</span>
        </div>
    </div>

    <div class="shortcuts">
        <kbd>←</kbd> <kbd>→</kbd> 切换 &nbsp;
        <kbd>空格</kbd> 播放 &nbsp;
        <kbd>Home</kbd> <kbd>End</kbd> 首尾
    </div>

    <div class="city-popup" id="city-popup">
        <div class="popup-name" id="popup-name"></div>
        <div class="popup-owner" id="popup-owner"></div>
        <div class="popup-type" id="popup-type"></div>
        <div class="popup-note" id="popup-note"></div>
    </div>

    <script>
        let CONFIG = {};
        let sliceIndex = [];
        let currentIndex = 0;
        let isPlaying = false;
        let playTimer = null;
        let citiesData = {};
        let eventsData = {};
        let colorMapData = {};
        let map;
        let dataLoaded = false;

        function showError(message, hint) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-hint').textContent = hint || '';
            document.getElementById('error-overlay').classList.add('show');
            console.error('[错误]', message, hint);
        }

        function formatYear(year) {
            if (year < 0) return `前${Math.abs(year)}年`;
            return `${year}年`;
        }

        async function fetchJson(url, label) {
            console.log(`[加载] ${label}: ${url}`);
            const res = await fetch(url);
            if (!res.ok) throw new Error(`${label} 加载失败: HTTP ${res.status} - ${url}`);
            return await res.json();
        }

        async function loadConfig() {
            const urlParams = new URLSearchParams(window.location.search);
            const configFile = urlParams.get('config') || 'config_xia.json';
            document.getElementById('loading-subtext').textContent = `正在加载配置: ${configFile}...`;

            try {
                const config = await fetchJson(configFile, '配置文件');
                CONFIG = {
                    outputDir: config.dataPaths?.outputDir || './output',
                    tileServer: config.tileServer || 'http://localhost:8000/tiles/china_dem/{z}/{x}/{y}.png',
                    initialCenter: config.map?.initialCenter || [113.5, 34.5],
                    initialZoom: config.map?.initialZoom || 5,
                    maxZoom: config.map?.maxZoom || 12,
                    minZoom: config.map?.minZoom || 3,
                    playInterval: config.playback?.interval || 2000,
                    transitionDuration: config.playback?.transitionDuration || 800,
                    dynasty: config.dynasty || {},
                    style: config.style || {},
                    dataPaths: config.dataPaths || {},
                };
                console.log('[配置] 加载完成:', CONFIG);
                return true;
            } catch (e) {
                showError(`配置文件加载失败: ${e.message}`, `请确保 ${configFile} 存在，或通过 URL 参数指定配置，如: ?config=config_shang.json`);
                return false;
            }
        }

        async function loadAllData() {
            try {
                const indexUrl = `${CONFIG.outputDir}/slice_index.json`;
                document.getElementById('loading-subtext').textContent = '正在加载时间断面索引...';
                sliceIndex = await fetchJson(indexUrl, '时间断面索引');
                if (!Array.isArray(sliceIndex) || sliceIndex.length === 0) throw new Error('slice_index.json 为空或格式错误');

                try {
                    const cityPath = CONFIG.dataPaths.cityJson;
                    if (cityPath) {
                        document.getElementById('loading-subtext').textContent = '正在加载城池数据...';
                        const cityJson = await fetchJson(cityPath, '城池数据');
                        if (cityJson && Array.isArray(cityJson.cities)) cityJson.cities.forEach(c => { citiesData[c.id] = c; });
                    }
                } catch (e) { console.warn('[可选] 城池数据加载失败:', e.message); }

                try {
                    const eventsPath = CONFIG.dataPaths.eventsJson;
                    if (eventsPath) {
                        document.getElementById('loading-subtext').textContent = '正在加载事件数据...';
                        const evJson = await fetchJson(eventsPath, '事件数据');
                        if (evJson && Array.isArray(evJson.events)) evJson.events.forEach(e => { eventsData[e.id] = e; });
                    }
                } catch (e) { console.warn('[可选] 事件数据加载失败:', e.message); }

                try {
                    const colorPath = CONFIG.dataPaths.colorMapJson;
                    if (colorPath) {
                        document.getElementById('loading-subtext').textContent = '正在加载颜色映射...';
                        colorMapData = await fetchJson(colorPath, '颜色映射');
                    }
                } catch (e) { console.warn('[可选] 颜色映射加载失败:', e.message); }

                dataLoaded = true;
                console.log(`[加载完成] ${sliceIndex.length} 个时间断面, ${Object.keys(citiesData).length} 个城池, ${Object.keys(eventsData).length} 个事件`);
                return true;
            } catch (e) {
                const hint = `可能原因：\n1. Python pipeline 未运行，未生成 output 目录下的 GeoJSON 文件\n2. outputDir 路径错误（当前: "${CONFIG.outputDir}"）\n3. HTTP 服务器未启动（请用 python -m http.server 运行）`;
                showError(e.message, hint);
                return false;
            }
        }

        function initTitle() {
            const d = CONFIG.dynasty || {};
            document.getElementById('dynasty-name').textContent = (d.name || '历史疆域') + '疆域变化';
            document.getElementById('dynasty-subtitle').textContent = d.period || '';
            document.getElementById('dynasty-period').textContent = d.focusPeriod || d.subtitle || '';
            document.getElementById('title-bar').style.display = 'block';
        }

        function initMap() {
            const style = CONFIG.style || {};
            let tileUrls = [CONFIG.tileServer];
            const fallbackTiles = ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}'];

            map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'map-tiles': { type: 'raster', tiles: tileUrls, tileSize: 256 }
                    },
                    layers: [
                        { id: 'background', type: 'background', paint: { 'background-color': '#e8e0d0' } },
                        {
                            id: 'map-tiles', type: 'raster', source: 'map-tiles',
                            paint: {
                                'raster-opacity': style.rasterOpacity ?? 0.5,
                                'raster-brightness-min': style.rasterBrightnessMin ?? 0.25,
                                'raster-brightness-max': style.rasterBrightnessMax ?? 0.65,
                                'raster-saturation': style.rasterSaturation ?? -0.8,
                                'raster-contrast': style.rasterContrast ?? -0.15,
                            }
                        },
                        {
                            id: 'vintage-overlay', type: 'background',
                            paint: {
                                'background-color': style.overlayColor || '#c9b896',
                                'background-opacity': style.overlayOpacity ?? 0.12
                            }
                        }
                    ]
                },
                center: CONFIG.initialCenter,
                zoom: CONFIG.initialZoom,
                maxZoom: CONFIG.maxZoom,
                minZoom: CONFIG.minZoom,
            });

            map.addControl(new maplibregl.NavigationControl(), 'top-left');

            let tileErrorCount = 0;
            map.on('error', (e) => {
                console.warn('[Map 错误]', e);
                if (e.error && e.error.status === 404 && tileErrorCount < 3) {
                    tileErrorCount++;
                    try {
                        map.removeLayer('map-tiles');
                        map.removeSource('map-tiles');
                        map.addSource('map-tiles', { type: 'raster', tiles: fallbackTiles, tileSize: 256 });
                        map.addLayer({
                            id: 'map-tiles', type: 'raster', source: 'map-tiles',
                            paint: {
                                'raster-opacity': style.rasterOpacity ?? 0.5,
                                'raster-brightness-min': style.rasterBrightnessMin ?? 0.25,
                                'raster-brightness-max': style.rasterBrightnessMax ?? 0.65,
                                'raster-saturation': style.rasterSaturation ?? -0.8,
                                'raster-contrast': style.rasterContrast ?? -0.15,
                            }
                        }, 'vintage-overlay');
                    } catch (switchErr) { console.error('[Map] 切换底图失败:', switchErr); }
                }
            });
            return map;
        }

        function initLayers() {
            const initialFile = sliceIndex[0]?.file || 'time_slice_initial.geojson';
            const initialUrl = `${CONFIG.outputDir}/${initialFile}`;

            // 疆域填充面
            map.addSource('territory', { type: 'geojson', data: initialUrl });

            map.addLayer({
                id: 'territory-fill',
                type: 'fill',
                source: 'territory',
                paint: {
                    'fill-color': ['get', 'fill'],
                    'fill-opacity': ['get', 'fill_opacity'],
                    'fill-outline-color': ['get', 'stroke']
                }
            });

            // 边界线隐藏
            map.addLayer({
                id: 'territory-border',
                type: 'line',
                source: 'territory',
                filter: ['!=', ['get', 'owner'], 'neutral'],
                paint: {
                    'line-color': ['get', 'stroke'],
                    'line-width': ['get', 'stroke_width'],
                    'line-opacity': 0
                }
            });

            // 势力名称标签 —— 强制显示在疆域中心，不避让
            map.addLayer({
                id: 'territory-label',
                type: 'symbol',
                source: 'territory',
                layout: {
                    'text-field': ['coalesce', ['get', 'country'], ['get', 'owner'], ['get', 'name'], ['get', 'id'], ''],
                    'text-size': 14,
                    'text-anchor': 'center',
                    'text-allow-overlap': true,
                    'text-ignore-placement': true,
                    'text-font': ['Noto Sans Regular'],
                    'text-padding': 2,
                    'text-max-width': 8,
                    'symbol-placement': 'point'
                },
                paint: {
                    'text-color': '#2c2c2c',
                    'text-halo-color': 'rgba(245, 240, 232, 0.95)',
                    'text-halo-width': 2.5,
                    'text-opacity': 0.95
                }
            });

            map.on('mousemove', 'territory-fill', (e) => {
                if (e.features.length > 0) map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'territory-fill', () => { map.getCanvas().style.cursor = ''; });
            map.on('click', 'territory-fill', (e) => {
                if (e.features.length > 0) {
                    const props = e.features[0].properties;
                    showNotification('疆域信息', `${props.country || props.owner || props.name || '未知'} · 辖${props.county_count || 0}县`);
                }
            });
        }

        function getOwnerColor(owner, defaultColor = '#2c2c2c') {
            const colors = colorMapData.colors || colorMapData;
            if (colors && colors[owner]) {
                const c = colors[owner];
                return typeof c === 'object' ? (c.fill || defaultColor) : c;
            }
            return defaultColor;
        }

        function initCityLayer() {
            const cities = Object.values(citiesData);
            if (cities.length === 0) return;

            const cityGeoJson = {
                type: 'FeatureCollection',
                features: cities.map(c => {
                    const owner = c.initial_owner || c.owner || 'unknown';
                    const color = getOwnerColor(owner);
                    return {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [c.lon, c.lat] },
                        properties: {
                            id: c.id,
                            name: c.ancient_name || c.name || c.id,
                            owner: owner,
                            type: c.type || '城池',
                            vassal_of: c.vassal_of || '',
                            note: c.note || '',
                            modern_name: c.modern_name || '',
                            color: color,
                            is_capital: (c.type === '都城')
                        }
                    };
                })
            };

            map.addSource('cities', { type: 'geojson', data: cityGeoJson });

            // 脉冲外圈
            map.addLayer({
                id: 'city-pulse',
                type: 'circle',
                source: 'cities',
                filter: ['==', ['get', 'id'], ''],
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 6, 5, 12, 8, 20, 12, 30],
                    'circle-color': ['get', 'color'],
                    'circle-opacity': 0.15,
                    'circle-stroke-width': 1,
                    'circle-stroke-color': ['get', 'color'],
                    'circle-stroke-opacity': 0.3
                }
            });

            // 普通城池
            map.addLayer({
                id: 'city-dot',
                type: 'circle',
                source: 'cities',
                filter: ['!=', ['get', 'type'], '都城'],
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 2, 5, 4, 8, 6, 12, 9],
                    'circle-color': ['get', 'color'],
                    'circle-opacity': 0.85,
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': 'rgba(245, 240, 232, 0.9)'
                }
            });

            // 都城（已缩小）
            map.addLayer({
                id: 'city-capital',
                type: 'circle',
                source: 'cities',
                filter: ['==', ['get', 'type'], '都城'],
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 3, 5, 5, 8, 7, 12, 9],
                    'circle-color': ['get', 'color'],
                    'circle-opacity': 0.95,
                    'circle-stroke-width': 2,
                    'circle-stroke-color': 'rgba(245, 240, 232, 0.95)'
                }
            });

            // 都城高光
            map.addLayer({
                id: 'city-capital-glow',
                type: 'circle',
                source: 'cities',
                filter: ['==', ['get', 'type'], '都城'],
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 3, 1.5, 5, 2.5, 8, 3.5, 12, 4.5],
                    'circle-color': '#f5f0e8',
                    'circle-opacity': 0.6
                }
            });

            // 注意：此处已移除 city-label 图层，不再显示城市名称

            const cityLayers = ['city-dot', 'city-capital', 'city-capital-glow'];
            cityLayers.forEach(layerId => {
                map.on('mouseenter', layerId, (e) => {
                    map.getCanvas().style.cursor = 'pointer';
                    if (e.features.length > 0) showCityPopup(e.features[0]);
                });
                map.on('mousemove', layerId, (e) => { updatePopupPosition(e); });
                map.on('mouseleave', layerId, () => { map.getCanvas().style.cursor = ''; hideCityPopup(); });
            });
        }

        function showCityPopup(feature) {
            const p = feature.properties;
            const popup = document.getElementById('city-popup');
            document.getElementById('popup-name').textContent = p.name;
            let ownerText = p.owner;
            if (p.vassal_of) ownerText += `（${p.vassal_of}附庸）`;
            document.getElementById('popup-owner').textContent = `归属：${ownerText}`;
            document.getElementById('popup-type').textContent = p.type;
            let note = '';
            if (p.modern_name) note += `今${p.modern_name}`;
            if (p.note) note += (note ? ' · ' : '') + p.note;
            document.getElementById('popup-note').textContent = note;
            const coords = feature.geometry.coordinates;
            const point = map.project(coords);
            popup.style.left = (point.x + 15) + 'px';
            popup.style.top = (point.y - 10) + 'px';
            popup.style.display = 'block';
        }

        function updatePopupPosition(e) {
            const popup = document.getElementById('city-popup');
            if (popup.style.display === 'block') {
                popup.style.left = (e.point.x + 15) + 'px';
                popup.style.top = (e.point.y - 10) + 'px';
            }
        }

        function hideCityPopup() { document.getElementById('city-popup').style.display = 'none'; }

        function switchTimeSlice(index) {
            if (!dataLoaded || sliceIndex.length === 0) return;
            if (index < 0 || index >= sliceIndex.length) return;

            currentIndex = index;
            const slice = sliceIndex[index];
            const fileUrl = `${CONFIG.outputDir}/${slice.file}`;

            const event = eventsData[slice.event_id];
            const hasTerritoryChange = event && event.changes && event.changes.some(c => c.to !== undefined);

            if (hasTerritoryChange && CONFIG.transitionDuration > 0) {
                transitionTerritory(fileUrl, event);
            } else {
                map.getSource('territory').setData(fileUrl);
            }

            if (event) {
                showEventNotification(event);
                highlightEventCities(event);
            }
            updateDisplay();
            preloadAdjacent(index);
        }

        function transitionTerritory(fileUrl, event) {
            const duration = CONFIG.transitionDuration || 800;
            const fadeOut = Math.floor(duration * 0.45);
            const fadeIn = Math.floor(duration * 0.45);

            map.style.transition = { duration: fadeOut, delay: 0 };
            map.setPaintProperty('territory-fill', 'fill-opacity', 0);
            map.setPaintProperty('territory-border', 'line-opacity', 0);
            map.setPaintProperty('territory-label', 'text-opacity', 0);

            setTimeout(() => {
                map.getSource('territory').setData(fileUrl);
                map.style.transition = { duration: fadeIn, delay: 0 };
                map.setPaintProperty('territory-fill', 'fill-opacity', ['get', 'fill_opacity']);
                map.setPaintProperty('territory-border', 'line-opacity', 0);
                map.setPaintProperty('territory-label', 'text-opacity', 0.95);
            }, fadeOut);
        }

        function updateDisplay() {
            if (!dataLoaded || sliceIndex.length === 0) return;
            const slice = sliceIndex[currentIndex] || {};
            document.getElementById('year-display').textContent = slice.year !== undefined ? formatYear(slice.year) : '——';
            document.getElementById('event-title').textContent = slice.title || '初始状态';
            const event = eventsData[slice.event_id];
            document.getElementById('event-desc').textContent = event?.description || event?.desc || '';
            const progress = sliceIndex.length > 1 ? (currentIndex / (sliceIndex.length - 1)) * 100 : 0;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-dot').style.left = `${progress}%`;
            document.getElementById('counter').textContent = `${currentIndex + 1} / ${sliceIndex.length}`;
        }

        function showEventNotification(event) {
            const notif = document.getElementById('event-notification');
            let typeText = '历史事件';
            const changes = event.changes || [];
            if (changes.length > 0 && changes.some(c => c.to !== undefined)) typeText = '领土变更';
            document.getElementById('notif-type').textContent = typeText;
            document.getElementById('notif-title').textContent = event.title || '';
            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 3000);
        }

        function showNotification(title, message) {
            const notif = document.getElementById('event-notification');
            document.getElementById('notif-type').textContent = title;
            document.getElementById('notif-title').textContent = message;
            notif.classList.add('show');
            setTimeout(() => { notif.classList.remove('show'); }, 2500);
        }

        function highlightEventCities(event) {
            const changes = event.changes || [];
            if (changes.length === 0) return;
            const cityIds = changes.map(c => c.city_id).filter(Boolean);
            if (cityIds.length === 0) return;

            if (map.getLayer('city-pulse')) {
                map.setFilter('city-pulse', ['in', ['get', 'id'], ['literal', cityIds]]);
                let pulseCount = 0;
                const maxPulse = 8;
                if (window._pulseInterval) clearInterval(window._pulseInterval);
                window._pulseInterval = setInterval(() => {
                    pulseCount++;
                    if (pulseCount >= maxPulse) {
                        clearInterval(window._pulseInterval); window._pulseInterval = null;
                        map.setFilter('city-pulse', ['==', ['get', 'id'], '']);
                        return;
                    }
                    const progress = pulseCount / maxPulse;
                    const wave = Math.sin(progress * Math.PI * 4);
                    const opacity = 0.05 + Math.abs(wave) * 0.2;
                    const radiusScale = 1 + Math.abs(wave) * 0.8;
                    map.setPaintProperty('city-pulse', 'circle-opacity', opacity);
                    map.setPaintProperty('city-pulse', 'circle-radius', [
                        'interpolate', ['linear'], ['zoom'],
                        3, 6 * radiusScale, 5, 12 * radiusScale, 8, 20 * radiusScale, 12, 30 * radiusScale
                    ]);
                }, 350);
            }

            if (map.getLayer('city-dot')) {
                const enlargedRadius = [
                    'case',
                    ['in', ['get', 'id'], ['literal', cityIds]],
                    ['interpolate', ['linear'], ['zoom'], 3, 4, 5, 7, 8, 10, 12, 14],
                    ['interpolate', ['linear'], ['zoom'], 3, 2, 5, 4, 8, 6, 12, 9]
                ];
                map.setPaintProperty('city-dot', 'circle-radius', enlargedRadius);
                setTimeout(() => {
                    map.setPaintProperty('city-dot', 'circle-radius', ['interpolate', ['linear'], ['zoom'], 3, 2, 5, 4, 8, 6, 12, 9]);
                }, 3000);
            }
        }

        function generateLegend() {
            const container = document.getElementById('legend-content');
            container.innerHTML = '';
            const colors = colorMapData.colors || colorMapData;
            if (!colors || Object.keys(colors).length === 0) {
                const defaultLegend = [
                    { name: '核心王朝', color: '#8B2500', isVassal: false },
                    { name: '核心附庸', color: '#C5927F', isVassal: true },
                    { name: '敌对势力', color: '#1B4F72', isVassal: false },
                    { name: '独立方国', color: '#D35400', isVassal: false },
                    { name: '无人控制', color: '#7F8C8D', isVassal: false },
                ];
                defaultLegend.forEach(item => addLegendItem(item.name, item.color, item.isVassal));
                return;
            }
            Object.entries(colors).forEach(([name, colorConfig]) => {
                if (typeof colorConfig === 'object') {
                    addLegendItem(name, colorConfig.fill || '#CCCCCC', false);
                    if (colorConfig.vassal_fill) addLegendItem(name, colorConfig.vassal_fill, true);
                } else if (typeof colorConfig === 'string') {
                    addLegendItem(name, colorConfig, false);
                }
            });
        }

        function addLegendItem(name, color, isVassal) {
            const container = document.getElementById('legend-content');
            const div = document.createElement('div');
            div.className = 'legend-item';
            div.innerHTML = `<div class="legend-color" style="background: ${color}; opacity: 0.85;"></div><div class="legend-label">${name}${isVassal ? '·附' : ''}</div>`;
            container.appendChild(div);
        }

        function generateProgressTicks() {
            const container = document.getElementById('progress-ticks');
            container.innerHTML = '';
            const total = sliceIndex.length;
            const step = Math.max(1, Math.floor(total / 30));
            for (let i = 0; i < total; i += step) {
                const tick = document.createElement('div');
                tick.className = 'progress-tick';
                container.appendChild(tick);
            }
        }

        function preloadAdjacent(index) {
            for (let i = -2; i <= 2; i++) {
                const idx = index + i;
                if (idx >= 0 && idx < sliceIndex.length && idx !== index) {
                    fetch(`${CONFIG.outputDir}/${sliceIndex[idx].file}`).catch(() => {});
                }
            }
        }

        function togglePlay() { if (isPlaying) pause(); else play(); }

        function play() {
            if (!dataLoaded || sliceIndex.length === 0) return;
            isPlaying = true;
            document.getElementById('btn-play').textContent = '⏸ 暂停';
            document.getElementById('btn-play').classList.add('playing');
            playTimer = setInterval(() => {
                if (currentIndex >= sliceIndex.length - 1) { pause(); return; }
                switchTimeSlice(currentIndex + 1);
            }, CONFIG.playInterval);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('btn-play').textContent = '▶ 播放';
            document.getElementById('btn-play').classList.remove('playing');
            clearInterval(playTimer);
        }

        function initControls() {
            document.getElementById('btn-first').addEventListener('click', () => { pause(); switchTimeSlice(0); });
            document.getElementById('btn-prev').addEventListener('click', () => { pause(); switchTimeSlice(currentIndex - 1); });
            document.getElementById('btn-play').addEventListener('click', togglePlay);
            document.getElementById('btn-next').addEventListener('click', () => { pause(); switchTimeSlice(currentIndex + 1); });
            document.getElementById('btn-last').addEventListener('click', () => { pause(); switchTimeSlice(sliceIndex.length - 1); });

            document.getElementById('progress-bar').addEventListener('click', (e) => {
                if (!dataLoaded || sliceIndex.length === 0) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const ratio = x / rect.width;
                const index = Math.round(ratio * (sliceIndex.length - 1));
                pause();
                switchTimeSlice(Math.max(0, Math.min(index, sliceIndex.length - 1)));
            });

            document.addEventListener('keydown', (e) => {
                if (!dataLoaded) return;
                switch (e.key) {
                    case 'ArrowLeft': e.preventDefault(); pause(); switchTimeSlice(currentIndex - 1); break;
                    case 'ArrowRight': e.preventDefault(); pause(); switchTimeSlice(currentIndex + 1); break;
                    case ' ':
                    case 'Spacebar': e.preventDefault(); togglePlay(); break;
                    case 'Home': e.preventDefault(); pause(); switchTimeSlice(0); break;
                    case 'End': e.preventDefault(); pause(); switchTimeSlice(sliceIndex.length - 1); break;
                }
            });
            generateProgressTicks();
        }

        async function safeStartup() {
            document.getElementById('loading-subtext').textContent = '正在读取配置...';
            const configOk = await loadConfig();
            if (!configOk) return;

            document.getElementById('loading-subtext').textContent = '正在初始化地图引擎...';
            const MAP_LOAD_TIMEOUT = 10000;
            const timeoutTimer = setTimeout(() => {
                showError('地图初始化超时', '可能原因：\n1. 瓦片服务器未启动（localhost:8000）\n2. 网络连接问题\n3. 配置文件中的 tileServer 地址错误');
            }, MAP_LOAD_TIMEOUT);

            try {
                initMap();
                await new Promise((resolve) => {
                    map.on('load', resolve);
                    map.on('error', (e) => { console.warn('[Map 错误]', e); });
                });
                clearTimeout(timeoutTimer);
                console.log('[地图] load 事件已触发');

                map.style.transition = { duration: 400, delay: 0 };

                document.getElementById('loading-subtext').textContent = '正在加载数据...';
                const dataOk = await loadAllData();
                if (!dataOk) return;

                document.getElementById('loading-subtext').textContent = '正在渲染图层...';
                initTitle();
                initLayers();
                initCityLayer();
                initControls();
                generateLegend();
                updateDisplay();

                document.getElementById('time-controller').style.display = 'block';
                document.getElementById('legend').style.display = 'block';
                document.getElementById('loading').classList.add('hidden');

                console.log('[系统] 全部初始化完成');
            } catch (e) {
                clearTimeout(timeoutTimer);
                showError('初始化失败: ' + e.message);
                console.error(e);
            }
        }

        safeStartup();
    </script>
</body>
</html>
